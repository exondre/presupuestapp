# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
concurrency:
  group: firebase-hosting-live-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build_and_deploy:
    name: 👷 Firebase deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node (npm cache)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: 📦 Install dependencies
        env:
          NPM_CONFIG_ENGINE_STRICT: "true"
        run: npm ci --no-audit --no-fund

      - name: 🔐 Inject environment variables
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          required_vars=(
            FIREBASE_API_KEY
            FIREBASE_AUTH_DOMAIN
            FIREBASE_PROJECT_ID
            FIREBASE_STORAGE_BUCKET
            FIREBASE_MESSAGING_SENDER_ID
            FIREBASE_APP_ID
            FIREBASE_MEASUREMENT_ID
          )

          for variable_name in "${required_vars[@]}"; do
            if [ -z "${!variable_name:-}" ]; then
              echo "::error::Missing required secret: ${variable_name}"
              exit 1
            fi
          done

          envsubst < src/environments/environment.prod.ts.template > src/environments/environment.prod.ts

          if grep -nE '\$\{[A-Z0-9_]+\}' src/environments/environment.prod.ts; then
            echo "::error::Found unresolved placeholders in src/environments/environment.prod.ts after envsubst"
            exit 1
          fi

      - name: 🏗️ Build Ionic app
        run: npm run build -- --configuration production
        env:
          CI: "true"
          NODE_ENV: production

      - name: 🚀 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRESUPUESTAPP_D0B94 }}
          channelId: live
          projectId: presupuestapp-d0b94
        env:
          CI: "true"
