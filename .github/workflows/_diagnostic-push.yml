name: Diagnostic Push Trigger
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Echo trigger info
        run: |
          echo "workflow triggered"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
