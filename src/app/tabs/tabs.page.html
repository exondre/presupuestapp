<ion-tabs (ionTabsDidChange)="setSelectedTab($event)">
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="home" href="/tabs/home">
      <ion-icon aria-hidden="true" [name]="selectedTab === 'home' ? 'home' : 'home-outline'"></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="balance" href="/tabs/balance">
      <ion-icon aria-hidden="true" [name]="selectedTab === 'balance' ? 'wallet' : 'wallet-outline'"></ion-icon>
      <ion-label>Balance</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="trends" href="/tabs/trends">
      <ion-icon aria-hidden="true" [name]="selectedTab === 'trends' ? 'trending-up' : 'trending-up-outline'"></ion-icon>
      <ion-label>Tendencias</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="history" href="/tabs/history">
      <ion-icon aria-hidden="true" [name]="selectedTab === 'history' ? 'time' : 'time-outline'"></ion-icon>
      <ion-label>Historial</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="settings" href="/tabs/settings">
      <ion-icon aria-hidden="true" [name]="selectedTab === 'settings' ? 'cog' : 'cog-outline'"></ion-icon>
      <ion-label>Ajustes</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>

<app-user-info-prompt-modal
  [isOpen]="isUserInfoPromptOpen()"
  (infoSaved)="handleUserInfoSaved($event)"
  (remindLater)="handleUserInfoRemindLater()"
  (dontAskAgain)="handleUserInfoDontAskAgain()"
  (dismissed)="handleUserInfoPromptDismissed()"
></app-user-info-prompt-modal>
