<ion-content [fullscreen]="true" class="home-content">
  <div class="home-header">
    <h1 class="home-header__greeting">Hola</h1>
    <p class="home-header__month">{{ currentMonthLabel() }}</p>
  </div>

  <div class="home-summary">
    <div class="home-summary-card home-summary-card--income">
      <span class="home-summary-card__label">Ingresos</span>
      <span class="home-summary-card__amount">{{ incomeLabel() }}</span>
    </div>
    <div class="home-summary-card home-summary-card--expense">
      <span class="home-summary-card__label">Gastos</span>
      <span class="home-summary-card__amount">{{ expenseLabel() }}</span>
    </div>
    <div class="home-summary-card home-summary-card--balance">
      <span class="home-summary-card__label">Balance</span>
      <span class="home-summary-card__amount">{{ balanceLabel() }}</span>
    </div>
  </div>

  <div class="home-actions">
    <ion-button expand="block" size="large" (click)="openEntryModal(null)">
      Nueva transacción
    </ion-button>
  </div>

  @if (recentEntries().length > 0) {
    <div class="home-recent">
      <div class="home-recent__header">
        <h2 class="home-recent__title">Recientes</h2>
        <ion-button fill="clear" size="small" (click)="navigateToBalance()">
          Ver todo
        </ion-button>
      </div>
      <ion-list lines="none" class="home-recent__list">
        @for (entry of recentEntries(); track entry.id) {
          <ion-item class="home-recent__item" lines="none">
            <app-entry-record [itemSignal]="entry" [showDate]="true" [compact]="true"></app-entry-record>
          </ion-item>
        }
      </ion-list>
    </div>
  }
</ion-content>

<app-new-entry-modal
  #newEntryModal
  (entrySaved)="handleEntrySaved($event)"
></app-new-entry-modal>
